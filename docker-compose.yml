services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUN_VERSION: '1.3.5'
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - ORIGIN=${SERVICE_FQDN_APP:-http://localhost:3000}
      - PUBLIC_OPENPANEL_CLIENT_ID=${PUBLIC_OPENPANEL_CLIENT_ID}
    expose:
      - '3000'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/health || exit 1']
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    restart: unless-stopped
    labels:
      - coolify.traefik.middlewares=crowdsec@file
    volumes:
      - nginx-cache:/var/cache/nginx
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
    expose:
      - '80'
    healthcheck:
      test: ['CMD-SHELL', 'nginx -t && curl -sf http://localhost/health > /dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - default
    depends_on:
      app:
        condition: service_healthy

volumes:
  nginx-cache:

networks:
  default:
    driver: bridge
