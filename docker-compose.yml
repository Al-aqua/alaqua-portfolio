services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUN_VERSION: "1.3.5"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ORIGIN: ${SERVICE_FQDN_APP:-http://localhost:3000}
      PUBLIC_OPENPANEL_CLIENT_ID: ${PUBLIC_OPENPANEL_CLIENT_ID}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 20s
    networks:
      - default
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    restart: unless-stopped
    labels:
      - coolify.traefik.middlewares=crowdsec@file
    volumes:
      - nginx-cache:/var/cache/nginx
    environment:
      NGINX_ENTRYPOINT_QUIET_LOGS: "1"
    expose:
      - "80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "nginx -t && wget -qO- http://127.0.0.1/health >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 10s
    networks:
      - default
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nginx-cache:

networks:
  default:
    driver: bridge
