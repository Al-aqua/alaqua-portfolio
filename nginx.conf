# nginx.conf
# Intended for use inside the `http` context, with one server block.

# --------------------------------------------------
# Global HTTP-level config
# --------------------------------------------------

# Hide nginx version
server_tokens off;

# Cache zone for proxied static assets
proxy_cache_path /var/cache/nginx/static
  levels=1:2
  keys_zone=STATIC_CACHE:20m
  max_size=500m
  inactive=7d
  use_temp_path=off;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=perip:10m;

# WebSocket / Upgrade handling
map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

# Optional: bypass cache on methods other than GET/HEAD
map $request_method $skip_cache_non_idempotent {
  default 1;
  GET 0;
  HEAD 0;
}

upstream sveltekit_upstream {
  server app:3000;
  keepalive 32;
}

# --------------------------------------------------
# Server
# --------------------------------------------------

server {
  listen 80 default_server;
  server_name _;

  # ----------------------------
  # Basic limits / buffers
  # ----------------------------
  limit_conn perip 100;

  client_max_body_size 10m;
  client_body_buffer_size 16k;
  client_header_buffer_size 1k;
  large_client_header_buffers 4 8k;

  # ----------------------------
  # Timeouts
  # ----------------------------
  client_body_timeout 12s;
  client_header_timeout 12s;
  keepalive_timeout 15s;
  send_timeout 10s;

  proxy_connect_timeout 5s;
  proxy_send_timeout 15s;
  proxy_read_timeout 30s;

  # ----------------------------
  # Security headers
  # ----------------------------
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Consider enabling HSTS only if HTTPS is always enforced upstream:
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # ----------------------------
  # Compression
  # ----------------------------
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    application/manifest+json
    image/svg+xml;

  # If your build pipeline creates .gz/.br files and nginx serves files directly,
  # these can help. For proxied SvelteKit responses, they usually do not apply:
  # gzip_static on;

  # ----------------------------
  # Shared proxy settings
  # ----------------------------
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port $server_port;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  # Prevent nginx from rewriting redirects unexpectedly
  proxy_redirect off;

  # ----------------------------
  # Health check
  # ----------------------------
  location = /health {
    access_log off;
    proxy_pass http://sveltekit_upstream;
  }

  # ----------------------------
  # Immutable SvelteKit build assets
  # ----------------------------
  location ^~ /_app/immutable/ {
    proxy_pass http://sveltekit_upstream;

    proxy_cache STATIC_CACHE;
    proxy_cache_methods GET HEAD;
    proxy_cache_valid 200 7d;
    proxy_cache_use_stale error timeout invalid_header
      updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_no_cache $skip_cache_non_idempotent;
    proxy_cache_bypass $skip_cache_non_idempotent;

    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header X-Cache-Status $upstream_cache_status always;
  }

  # ----------------------------
  # Other cacheable static assets
  # ----------------------------
  location ~* \.(?:css|js|mjs|jpg|jpeg|png|gif|ico|svg|webp|avif|woff2?|ttf|eot)$ {
    proxy_pass http://sveltekit_upstream;

    proxy_cache STATIC_CACHE;
    proxy_cache_methods GET HEAD;
    proxy_cache_valid 200 1d;
    proxy_cache_use_stale error timeout invalid_header
      updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_no_cache $skip_cache_non_idempotent;
    proxy_cache_bypass $skip_cache_non_idempotent;

    add_header Cache-Control "public, max-age=86400" always;
    add_header X-Cache-Status $upstream_cache_status always;
  }

  # ----------------------------
  # API routes
  # ----------------------------
  location ^~ /api/ {
    limit_req zone=api burst=20 nodelay;

    proxy_pass http://sveltekit_upstream;

    # Usually API responses should not be cached by intermediaries
    add_header Cache-Control "no-store" always;
  }

  # ----------------------------
  # Block hidden files except .well-known
  # ----------------------------
  location ~ /\.(?!well-known) {
    access_log off;
    log_not_found off;
    return 404;
  }

  # ----------------------------
  # Block common scanner targets
  # ----------------------------
  location ~* ^/(wp-admin|wp-content|wp-includes|xmlrpc\.php|wp-login\.php)$ {
    access_log off;
    log_not_found off;
    return 404;
  }

  location ~* ^/(?:\.git|\.env|composer\.json|package-lock\.json|package\.json)$ {
    access_log off;
    log_not_found off;
    return 404;
  }

  # ----------------------------
  # Block unsupported executable/script extensions
  # ----------------------------
  location ~* \.(php|aspx|jsp|cgi|exe)$ {
    return 444;
  }

  # ----------------------------
  # Default app traffic
  # ----------------------------
  location / {
    limit_req zone=general burst=60 nodelay;
    proxy_pass http://sveltekit_upstream;
  }
}
